      evaluator: spark-specs/prd-reviewer.agent.md
      template: spark-specs/references/prd-template.md
      guidelines: spark-specs/references/prd-template-guide.md
    - type: architecture
      editor: spark-specs/architecture-editor.agent.md
      evaluator: spark-specs/architecture-reviewer.agent.md
      template: spark-specs/references/architecture-template.md
      guidelines: spark-specs/references/architecture-template-guide.md
    - type: feature
