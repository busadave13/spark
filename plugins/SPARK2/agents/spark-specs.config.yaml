      evaluator: spark-specs/feature-reviewer.agent.md
      template: spark-specs/references/feature-template.md
      guidelines: spark-specs/references/feature-template-guide.md
    - type: adr
      editor: spark-specs/adr-editor.agent.md
      evaluator: spark-specs/adr-reviewer.agent.md
      template: spark-specs/references/adr-template.md
      guidelines: spark-specs/references/adr-template-guide.md
