spark:
  documents:
    - name: prd
      description: "Product Requirement Documents"
    - name: architecture
      description: "Architecture Specifications"
    - name: feature
      description: "Feature Specifications"
    - name: adr
      description: "Architecture Decision Records"
    - name: testplan
      description: "Test Plans"
  folders:
    root: ./.specs
    prd: ./.specs/{projectName}
    architecture: ./.specs/{projectName}
    feature: ./.specs/{projectName}/feature
    adr: ./.specs/{projectName}/adr
    testplan: ./.specs/{projectName}/testplan
  spark-sdd:
    enabled: true
  agents:
    - type: prd
      editor: prd-editor
      reviewer: prd-reviewer
      template: spark-sdd/references/prd-template.md
      guide: spark-sdd/references/prd-template-guide.md
    - type: architecture
      editor: architecture-editor
      reviewer: architecture-reviewer
      template: spark-sdd/references/architecture-template.md
      guide: spark-sdd/references/architecture-template-guide.md
    - type: feature
      editor: feature-editor
      reviewer: feature-reviewer
      template: spark-sdd/references/feature-template.md
      guide: spark-sdd/references/feature-template-guide.md
    - type: adr
      editor: adr-editor
      reviewer: adr-reviewer
      template: spark-sdd/references/adr-template.md
      guide: spark-sdd/references/adr-template-guide.md