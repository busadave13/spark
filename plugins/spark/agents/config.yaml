roots:
    # All paths are resolved relative to this config.yaml file.
    # Rename the parent folder (e.g. .github -> .copilot) and the workflow still works
    # as long as these relative paths stay valid.
    agents: .
    skills: ../skills
    instructions: ../instructions
spark:
    enabled: true
    utilities:
        comments: comments-editor.agent.md
        status: spark-status.agent.md
    specs:
        - type: prd
          editor: prd-editor.agent.md
          evaluator: prd-reviewer.agent.md
          template: references/prd-template.md
          guidelines: references/prd-section-guide.md
        - type: architecture
          editor: architecture-editor.agent.md
          evaluator: architecture-reviewer.agent.md
          template: references/architecture-template.md
          guidelines: references/architecture-section-guide.md
        - type: feature
          editor: feature-editor.agent.md
          evaluator: feature-reviewer.agent.md
          template: references/feature-template.md
          guidelines: references/feature-section-guide.md
        - type: adr
          editor: adr-editor.agent.md
          evaluator: adr-reviewer.agent.md
          template: references/adr-template.md
          guidelines: references/adr-section-guide.md 
tdd:
    enabled: true
    reviewer: tdd-reviewer.agent.md
    agents:
        - type: dotnet-webapi
          agent: tdd-dotnet-webapi.agent.md
          scaffold: dotnet-webapi-project
          phases:
              context: tdd-dotnet-webapi-context.agent.md
              planner: tdd-dotnet-webapi-planner.agent.md
              implementer: tdd-dotnet-webapi-implementer.agent.md
              gate: tdd-dotnet-webapi-gate.agent.md
          brief: references/tdd-execution-brief-template.md
          reviewer_checklist: references/tdd-reviewer-checklist.md
aspire:
    enabled: true
